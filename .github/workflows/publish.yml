name: Publish npm package

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Optional debug: check secret length
      - name: Check secret length
        run: |
          echo "Secret length: ${#TECHBRIDGEGROUP_ACCESS_TOKEN}"
        env:
          TECHBRIDGEGROUP_ACCESS_TOKEN: ${{ secrets.TECHBRIDGEGROUP_ACCESS_TOKEN }}

      # Step 3: Set up Node.js and authenticate to GitHub Packages
      - name: Set up Node.js and npm auth
        uses: actions/setup-node@v3
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
          scope: '@gim2510'                     # must match the package scope
          token: ${{ secrets.TECHBRIDGEGROUP_ACCESS_TOKEN }}

      # Step 4: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 5: Build the package
      - name: Build package
        run: npm run build

      # Step 6: Optional debug: verify npm auth
      - name: Verify npm authentication
        run: npm whoami

      # Step 7: Publish package
      - name: Publish package
        run: npm publish