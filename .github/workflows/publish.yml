name: Publish npm package

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check secret length
        run: |
          echo "Secret length: ${#TECHBRIDGEGROUP_ACCESS_TOKEN}"
        env:
          TECHBRIDGEGROUP_ACCESS_TOKEN: ${{ secrets.TECHBRIDGEGROUP_ACCESS_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/

      - name: Authenticate to GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.TECHBRIDGEGROUP_ACCESS_TOKEN }}" > ~/.npmrc

      - name: Install dependencies
        run: npm install

      - name: Build package
        run: npm run build

      - name: Publish package
        run: npm publish