name: Publish npm package

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup npm auth
        run: |
          echo "@gim2510:registry=https://npm.pkg.github.com/" >> $NPM_CONFIG_USERCONFIG
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> $NPM_CONFIG_USERCONFIG
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TECHBRIDGEGROUP_ACCESS_TOKEN }}

      - run: npm install
      - run: npm run build

      - run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TECHBRIDGEGROUP_ACCESS_TOKEN }}

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TECHBRIDGEGROUP_ACCESS_TOKEN }}