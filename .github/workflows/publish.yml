name: Publish npm package

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
          scope: '@gim2510'
          token: ${{ secrets.TECHBRIDGEGROUP_ACCESS_TOKEN }}

      - run: npm install
      - run: npm run build

      # debug
      - run: npm whoami || echo "Not logged in (debug)"

      - run: npm publish