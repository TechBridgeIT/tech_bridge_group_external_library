name: Publish npm package

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
          scope: '@gim2510'
          token: ${{ secrets.TECHBRIDGEGROUP_ACCESS_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build package
        run: npm run build

      # Debug: mostra la configurazione npm nella cartella del progetto
      - name: Show npmrc
        run: cat .npmrc

      - name: Publish package
        run: npm publish --verbose
        env:
          NPM_CONFIG_LOGLEVEL: verbose