name: Publish npm package

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
          scope: '@gim2510'

      - run: npm install
      - run: npm run build

      # debug
      - run: npm config set @gim2510:registry https://npm.pkg.github.com/

      - run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TECHBRIDGEGROUP_ACCESS_TOKEN }}

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TECHBRIDGEGROUP_ACCESS_TOKEN }}